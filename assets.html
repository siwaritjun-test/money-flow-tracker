<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --panel2: #1c2128; --border: #2d333b;
    --text: #e6edf3; --muted: #8b949e; --green: #3fb950; --red: #f85149;
    --blue: #58a6ff; --amber: #d29922;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  header { padding: 18px 24px; display: flex; flex-wrap: wrap; align-items: center; gap: 14px; position: sticky; top: 0; background: rgba(13,17,23,.92); backdrop-filter: blur(6px); border-bottom: 1px solid var(--border); z-index: 5; }
  h1 { font-size: 20px; font-weight: 700; }
  a.back { color: var(--blue); text-decoration: none; font-size: 13px; }
  a.back:hover { text-decoration: underline; }
  .seg { display: inline-flex; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-left: auto; }
  .seg button { background: none; border: none; color: var(--muted); padding: 7px 14px; font-size: 13px; cursor: pointer; border-right: 1px solid var(--border); }
  .seg button:last-child { border-right: none; }
  .seg button.active { background: var(--blue); color: #fff; font-weight: 600; }
  main { padding: 20px 24px 40px; max-width: 1200px; margin: 0 auto; }
  .group-title { font-size: 13px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin: 26px 0 12px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 14px; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 16px; scroll-margin-top: 90px; }
  .card.hl { border-color: var(--blue); box-shadow: 0 0 0 1px var(--blue); }
  .card .top { display: flex; align-items: baseline; gap: 10px; margin-bottom: 2px; }
  .tick { font-weight: 800; font-size: 16px; }
  .card .nm { color: var(--muted); font-size: 12px; flex: 1; min-width: 0; }
  .px { font-size: 14px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .chg { font-size: 11px; font-variant-numeric: tabular-nums; }
  .pos { color: var(--green); } .neg { color: var(--red); }
  .spark { width: 100%; height: 36px; margin: 8px 0 4px; }
  dl { font-size: 12.5px; line-height: 1.55; }
  dt { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: .8px; margin-top: 9px; }
  dd { margin: 1px 0 0; }
  .chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 3px; }
  .chip { background: var(--panel2); border: 1px solid var(--border); border-radius: 10px; padding: 1px 8px; font-size: 11px; white-space: nowrap; }
  .chip b { font-weight: 600; }
  .meta { display: flex; gap: 14px; margin-top: 10px; font-size: 11px; color: var(--muted); }
  .ext { margin-top: 10px; font-size: 12px; }
  .ext a { color: var(--blue); text-decoration: none; }
  .ext a:hover { text-decoration: underline; }
  footer { padding: 0 24px 30px; font-size: 11px; color: var(--muted); max-width: 1200px; margin: 0 auto; line-height: 1.6; }
</style>
</head>

    tracks:"Front-month COMEX copper futures price.",
    inside:"'Dr. Copper' — wired into construction, grids, EVs and electronics, so its price embeds a real-time global growth forecast.",
    top:["copper futures"],
    flow:"Copper/gold rising = market pricing real growth (supports cyclicals, yields); falling = growth doubts (supports bonds, defensives)." },
};

const GROUP_TITLES = { cross: "Cross-Asset", sectors: "US Sectors — Select Sector SPDRs (cap-weighted slices of the S&P 500)", bonds: "Bonds & Credit", factors: "US Factors / Style", regime: "Regime Gauges (indices & futures — power the regime bar, not flow assets)" };
const PROXIES = [
  u => u,
  u => "https://api.allorigins.win/raw?url=" + encodeURIComponent(u),
  u => "https://corsproxy.io/?url=" + encodeURIComponent(u),
  u => "https://api.codetabs.com/v1/proxy?quest=" + encodeURIComponent(u),
];

/* ============ render cards ============ */
function card(t, a) {
  const yurl = "https://finance.yahoo.com/quote/" + encodeURIComponent(t) + "/";
  return `<div class="card" id="${t}" data-g="${a.g}">
    <div class="top"><span class="tick">${t}</span><span class="nm">${a.name}</span><span class="px" id="px-${t}"></span><span class="chg" id="chg-${t}"></span></div>
    <svg class="spark" id="spark-${t}" preserveAspectRatio="none"></svg>
    <dl>
      <dt>Tracks</dt><dd>${a.tracks}</dd>
      <dt>What's inside</dt><dd>${a.inside}</dd>
      <dt>Representative holdings</dt><dd><div class="chips">${a.top.map(h => `<span class="chip">${h}</span>`).join("")}</div></dd>
      <dt>How to read its flows</dt><dd>${a.flow}</dd>
    </dl>
    <div class="meta"><span>Issuer: ${a.issuer}</span><span>Expense ratio: ${a.er}</span></div>
    <div class="ext"><a href="${yurl}" target="_blank" rel="noopener">Current holdings & quote on Yahoo Finance &rarr;</a></div>
  </div>`;
}

function renderAll() {
  const main = document.getElementById("main");
  let html = "";
  for (const g of ["cross", "sectors", "bonds", "factors", "regime"]) {
    html += `<div class="group-title" data-g="${g}">${GROUP_TITLES[g]}</div><div class="grid" data-g="${g}">`;
    for (const [t, a] of Object.entries(INFO)) if (a.g === g) html += card(t, a);
    html += "</div>";
  }
  main.innerHTML = html;
}

function applyFilter(f) {
  document.querySelectorAll("[data-g]").forEach(el => {
    if (el.classList.contains("card")) return; // cards hide via parent grids
    el.style.display = (f === "all" || el.dataset.g === f) ? "" : "none";
  });
}

/* ============ live sparklines (single batched request) ============ */
async function loadSparks() {
  const symbols = Object.keys(INFO);
  // 1) prefer data.json committed by the GitHub Action (same-origin, ~6 months)
  try {
    const r = await fetch("data.json?t=" + Date.now(), { signal: AbortSignal.timeout(8000) });
    if (r.ok) {
      const j = await r.json();
      let drawn = 0;
      for (const t of symbols) {
        const rows = j?.series?.[t];
        if (Array.isArray(rows) && rows.length > 10 && drawSpark(t, rows.map(x => x[1]))) drawn++;
      }
      if (drawn >= symbols.length * 0.6) return;
    }
  } catch (e) { /* not hosted with data.json */ }
  // 2) live batched spark via proxies (1 year)
  const base = `https://query1.finance.yahoo.com/v8/finance/spark?symbols=${encodeURIComponent(symbols.join(","))}&range=1y&interval=1d`;
  for (const wrap of PROXIES) {
    try {
      const r = await fetch(wrap(base), { signal: AbortSignal.timeout(15000) });
      if (!r.ok) continue;
      const j = await r.json();
      const arr = Array.isArray(j) ? j : (j?.spark?.result || j?.result);
      if (!arr || !arr.length) continue;
      let drawn = 0;
      for (const item of arr) {
        const res = item.response?.[0] ?? item;
        const sym = item.symbol || res?.meta?.symbol;
        const closes = (res?.indicators?.quote?.[0]?.close || []).filter(v => v != null);
        if (sym && closes.length > 10 && drawSpark(sym, closes)) drawn++;
      }
      if (drawn) return;
    } catch (e) {}
  }
  // fallback: per-ticker (sequential-ish, 4 workers) so the page still fills in
  let idx = 0;
  async function worker() {
    while (idx < symbols.length) {
      const t = symbols[idx++];
      const u = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(t)}?range=1y&interval=1d`;
      for (const wrap of PROXIES) {
        try {
          const r = await fetch(wrap(u), { signal: AbortSignal.timeout(10000) });
          if (!r.ok) continue;
          const res = (await r.json())?.chart?.result?.[0];
          const closes = (res?.indicators?.quote?.[0]?.close || []).filter(v => v != null);
          if (closes.length > 10) { drawSpark(t, closes); break; }
        } catch (e) {}
      }
    }
  }
  await Promise.all([worker(), worker(), worker(), worker()]);
}

function drawSpark(t, closes) {
  const svg = document.getElementById("spark-" + t);
  if (!svg) return false;
  const W = 320, H = 36;
  svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
  const min = Math.min(...closes), max = Math.max(...closes), span = (max - min) || 1;
  const pts = closes.map((v, i) => `${(i / (closes.length - 1) * W).toFixed(1)},${(H - 3 - (v - min) / span * (H - 6)).toFixed(1)}`).join(" ");
  const up = closes[closes.length - 1] >= closes[0];
  const col = up ? "var(--green)" : "var(--red)";
  svg.innerHTML = `<polyline points="${pts}" fill="none" stroke="${col}" stroke-width="1.4" opacity="0.9"/>`;
  const last = closes[closes.length - 1], ret = last / closes[0] - 1;
  const px = document.getElementById("px-" + t), chg = document.getElementById("chg-" + t);
  if (px) px.textContent = last >= 1000 ? last.toLocaleString(undefined, { maximumFractionDigits: 0 }) : last.toFixed(2);
  const spanLbl = closes.length > 200 ? "1y" : "6m"; // data.json carries ~6 months, spark carries 1y
  if (chg) { chg.textContent = (ret >= 0 ? "+" : "") + (ret * 100).toFixed(1) + "% " + spanLbl; chg.className = "chg " + (ret >= 0 ? "pos" : "neg"); }
  return true;
}

/* ============ wiring ============ */
renderAll();
document.getElementById("filter-seg").addEventListener("click", e => {
  if (!e.target.dataset.f) return;
  document.querySelectorAll("#filter-seg button").forEach(b => b.classList.toggle("active", b === e.target));
  applyFilter(e.target.dataset.f);
});
// deep link: assets.html#XLK scrolls to + highlights the card
if (location.hash) {
  const el = document.getElementById(decodeURIComponent(location.hash.slice(1)));
  if (el) { el.classList.add("hl"); setTimeout(() => el.scrollIntoView({ behavior: "smooth", block: "center" }), 100); }
}
loadSparks();
</script>
</body>
